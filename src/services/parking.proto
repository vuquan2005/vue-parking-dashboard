syntax = "proto3";

message Parking {
  oneof payload {
    WifiScanning  wifi_scanning  = 1;
    ScanResults   scan_results   = 2;
    DeviceStatus  wifi_status    = 3;
    ParkingStatus parking_status = 4;
    ParkingEvent  parking_event  = 5;
    WifiConfig    wifi_config    = 6;
  }
}

message ParkingStatus {
  // Grid layout: maps slot_id - 1 to pallet_id (0 if no pallet)
  repeated uint32 pallet_grid = 1; // max_count: 12 (nanopb)

  // Status per pallet: maps pallet_id - 1 to pallet status
  repeated Status slots       = 2; // max_count: 10 (nanopb)


  enum Status {
    UNKNOWN    = 0;
    EMPTY      = 1;
    OCCUPIED   = 2;
    PROCESSING = 3;
    PENDING    = 4;
  }
}


message ParkingEvent {
  uint32       event_id     = 1;
  uint32       pallet_id    = 2;
  uint64       timestamp    = 3; // Unix epoch time in milliseconds
  EventType    event_type   = 4;
  bool         is_done      = 6;

  enum EventType {
    UNKNOWN = 0;
    IN      = 1;
    OUT     = 2;
  }
}

message WifiScanning {
}

message ScanResults {
  message AP {
    string       ssid       = 1; // max_size: 32 (nanopb)
    bytes        bssid      = 2; // 6 bytes MAC address (nanopb)
    int32        rssi       = 3;
    uint32       channel    = 4;
    WifiAuthMode encryption = 5;
  }

  enum WifiAuthMode {
    WIFI_AUTH_OPEN                    = 0;
    WIFI_AUTH_WEP                     = 1;
    WIFI_AUTH_WPA_PSK                 = 2;
    WIFI_AUTH_WPA2_PSK                = 3;
    WIFI_AUTH_WPA_WPA2_PSK            = 4;
    WIFI_AUTH_ENTERPRISE              = 5;
    // WIFI_AUTH_WPA2_ENTERPRISE         = 5;
    WIFI_AUTH_WPA3_PSK                = 6;
    WIFI_AUTH_WPA2_WPA3_PSK           = 7;
    WIFI_AUTH_WAPI_PSK                = 8;
    WIFI_AUTH_OWE                     = 9;
    WIFI_AUTH_WPA3_ENT_192            = 10;
    WIFI_AUTH_WPA3_EXT_PSK            = 11;
    WIFI_AUTH_WPA3_EXT_PSK_MIXED_MODE = 12;
    WIFI_AUTH_DPP                     = 13;
    WIFI_AUTH_WPA3_ENTERPRISE         = 14;
    WIFI_AUTH_WPA2_WPA3_ENTERPRISE    = 15;
    WIFI_AUTH_WPA_ENTERPRISE          = 16;
  }

  repeated AP access_points = 1; // max_count: 10 (nanopb)

}

message DeviceStatus {
  bool     connected           = 1;
  WifiMode wifi_mode           = 2;

  string   sta_ssid            = 3; // max_size: 32 (nanopb)
  string   sta_ip              = 4; // max_size: 16 (nanopb)

  string   ap_ssid             = 5; // max_size: 32 (nanopb)
  string   ap_ip               = 6; // max_size: 16 (nanopb)
  string   ap_password         = 7; // max_size: 64 (nanopb)

  int32    rssi                = 8;
  uint32   channel             = 9;

  uint32   free_heap           = 10;
  uint32   min_free_heap       = 11;
  uint32   max_free_block_size = 12;
  uint32   uptime_seconds      = 13;

  enum WifiMode {
    WIFI_MODE_NULL  = 0;
    WIFI_MODE_STA   = 1;
    WIFI_MODE_AP    = 2;
    WIFI_MODE_APSTA = 3;
    WIFI_MODE_NAN   = 4;
  }
}

message WifiConfig {
  string sta_ssid     = 1; // max_size: 32 (nanopb)
  string sta_password = 2; // max_size: 64 (nanopb)
  string ap_ssid      = 3; // max_size: 32 (nanopb)
  string ap_password  = 4; // max_size: 64 (nanopb)
}
