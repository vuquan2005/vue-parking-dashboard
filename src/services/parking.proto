syntax = "proto3";

package iot.parking;

message Parking {
  oneof payload {
    WifiScanning  wifi_scanning  = 1;
    ScanResults   scan_results   = 2;
    DeviceStatus  wifi_status    = 3;
    ParkingStatus parking_status = 4;
    ParkingEvent  parking_event  = 5;
  }
}

message WifiScanning {
}

message ScanResults {
  message AP {
    string       ssid       = 1; // max_size: 32
    bytes        bssid      = 2; // 6 bytes MAC address
    int32        rssi       = 3;
    uint32       channel    = 4;
    WifiAuthMode encryption = 5;
  }

  enum WifiAuthMode {
    option allow_alias = true;
    WIFI_AUTH_OPEN                    = 0;
    WIFI_AUTH_WEP                     = 1;
    WIFI_AUTH_WPA_PSK                 = 2;
    WIFI_AUTH_WPA2_PSK                = 3;
    WIFI_AUTH_WPA_WPA2_PSK            = 4;
    WIFI_AUTH_ENTERPRISE              = 5;
    WIFI_AUTH_WPA2_ENTERPRISE         = 5;
    WIFI_AUTH_WPA3_PSK                = 6;
    WIFI_AUTH_WPA2_WPA3_PSK           = 7;
    WIFI_AUTH_WAPI_PSK                = 8;
    WIFI_AUTH_OWE                     = 9;
    WIFI_AUTH_WPA3_ENT_192            = 10;
    WIFI_AUTH_WPA3_EXT_PSK            = 11;
    WIFI_AUTH_WPA3_EXT_PSK_MIXED_MODE = 12;
    WIFI_AUTH_DPP                     = 13;
    WIFI_AUTH_WPA3_ENTERPRISE         = 14;
    WIFI_AUTH_WPA2_WPA3_ENTERPRISE    = 15;
    WIFI_AUTH_WPA_ENTERPRISE          = 16;
  }

  repeated AP access_points = 1; // max_count: 10

}

message DeviceStatus {
  bool     connected           = 1;
  WifiMode wifi_mode           = 2;
  string   ssid                = 3; // max_size: 32
  string   ip_address          = 4; // max_size: 16
  int32    rssi                = 5;
  uint32   channel             = 6;
  uint32   free_heap           = 7;
  uint32   min_free_heap       = 8;
  uint32   max_free_block_size = 9;
  uint32   uptime_seconds      = 10;

  enum WifiMode {
    WIFI_MODE_NULL  = 0;
    WIFI_MODE_STA   = 1;
    WIFI_MODE_AP    = 2;
    WIFI_MODE_APSTA = 3;
    WIFI_MODE_NAN   = 4;
  }
}

message ParkingStatus {
  repeated SlotStatus slots = 1; // max_count: 15
}

message SlotStatus {
  uint32         slot_id = 1;
  Status         status  = 2;
  repeated bytes rfid    = 3; // raw RFID tag bytes (10 bytes each), max_count: 15

  enum Status {
    UNKNOWN    = 0;
    NO_PALLET  = 1;
    EMPTY      = 2;
    OCCUPIED   = 3;
    PROCESSING = 4;
    PENDING    = 5;
  }

}

message ParkingEvent {
  uint32       event_id     = 1;
  uint32       slot_id      = 2;
  uint64       timestamp    = 3; // Unix epoch time in milliseconds
  EventType    event_type   = 4;
  bytes        rfid         = 5;
  uint32       step         = 6; // (process%) 1, 2, 3, 4, 5,...
  uint32       total_steps  = 7;
  ParkingSteps current_step = 8;

  enum EventType {
    UNKNOWN = 0;
    IN      = 1;
    OUT     = 2;
  }
}

message ParkingSteps {
  uint32 step_id = 1;
  Task   task    = 2;

  enum Task {
    UNKNOWN    = 0;
    MOVE_UP    = 1;
    MOVE_DOWN  = 2;
    MOVE_LEFT  = 3;
    MOVE_RIGHT = 4;
    PICK_UP    = 5;
  }
}
